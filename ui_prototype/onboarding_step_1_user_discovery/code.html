<header class="fixed top-0 w-full z-50 flex justify-center items-center h-16 px-6 bg-surface/80 backdrop-blur-md">

<!-- Discovery Radar Visualization -->
<div class="relative w-full max-w-[280px] aspect-square flex items-center justify-center mb-16">

<div class="absolute inset-0 border border-outline-variant/10 rounded-full"></div>
<div class="absolute inset-[15%] border border-outline-variant/20 rounded-full"></div>
<div class="absolute inset-[30%] border border-outline-variant/30 rounded-full"></div>
<div class="absolute inset-[45%] border border-outline-variant/40 rounded-full"></div>
<!-- Pulse Effect -->
<div class="absolute inset-[-10%] radar-pulse rounded-full animate-pulse"></div>
<!-- Central Identity -->
<div class="relative z-10 w-20 h-20 bg-surface-container-high rounded-full flex items-center justify-center gold-glow border border-primary/20">
<span class="material-symbols-outlined text-primary text-4xl leading-none">radar</span>
</div>
<!-- Discovered Devices -->
<div class="absolute top-[15%] left-[20%]">
<div class="w-2.5 h-2.5 bg-primary rounded-full gold-glow-soft animate-bounce" style="animation-duration: 3s;"></div>
</div>
<div class="absolute bottom-[25%] right-[15%]">
<div class="w-2 h-2 bg-primary/60 rounded-full"></div>
</div>
<div class="absolute top-[40%] right-[10%]">

</div>
<div class="absolute bottom-[15%] left-[30%]">
<div class="w-2 h-2 bg-primary/40 rounded-full"></div>
</div>
</div>

<div class="text-center space-y-4 max-w-[280px]">
<h2 class="text-3xl font-extrabold tracking-tight text-on-surface leading-tight text-glow">Discover Nearby</h2>
<p class="text-on-surface-variant leading-relaxed text-sm font-medium">
                Identify and connect with devices in your immediate surroundings instantly.
            </p>
</div>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full px-6 pb-12 pt-8 bg-gradient-to-t from-surface via-surface to-transparent">
<div class="max-w-md mx-auto flex flex-col items-center">

<div class="w-4 h-1 rounded-full bg-outline-variant/30"></div>
<div class="w-4 h-1 rounded-full bg-outline-variant/30"></div>
