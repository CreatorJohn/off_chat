</div>

<path d="M 120 150 Q 200 200 280 250" fill="none" stroke="url(#goldGradient)" stroke-dasharray="1 12" stroke-linecap="round" stroke-width="6"></path>

<stop offset="50%" style="stop-color:#f2ca50;stop-opacity:1"></stop>
<stop offset="100%" style="stop-color:#d4af37;stop-opacity:0.1"></stop>
</lineargradient>
</defs>
</svg>
</div>

<div class="absolute bottom-4 right-4 w-36 h-60 bg-surface-container rounded-[2.5rem] p-2 rotate-[6deg] z-20 border border-primary/30 shadow-2xl">

</div>
</div>
</div>
</div>

<h2 class="text-3xl font-extrabold tracking-tight text-on-surface leading-tight text-glow">
            Share the <span class="text-primary">Moment</span>
</h2>
<p class="text-on-surface-variant text-base leading-relaxed max-w-[320px] mx-auto">
            Send high-quality images and files directly to nearby devices instantly.
        </p>
</div>
</main>
<!-- Fixed Bottom Action Area -->
<div class="fixed bottom-0 left-0 w-full px-6 pb-10 pt-10 bg-gradient-to-t from-surface via-surface to-transparent">
