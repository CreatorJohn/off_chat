<nav class="flex items-center justify-between px-6 py-4 w-full bg-[#131313] dark:bg-[#131313] fixed top-0 z-50">
<button class="hover:bg-[#2a2a2a] transition-colors p-2 rounded-full active:scale-95 duration-200">
<span class="material-symbols-outlined text-[#f2ca50]" data-icon="arrow_back">arrow_back</span>
</button>
<h1 class="font-plus-jakarta text-[#e2e2e2] uppercase tracking-[0.05rem] text-xs">Profile Setup</h1>
<img alt="Offchat Logo" class="h-8 w-auto object-contain" src="https://lh3.googleusercontent.com/aida/ADBb0ujcfArjYK_8bETqI2iZxRBg2Cn31s7zqklo5pnwwioN0D5AJ8QQN-7U9tEXARtiLW4SfheRdt2S06-Dsfwco27dSuPY1XV9P94Vm5r6noDPuc2EwZiDQIceC9LowhOLomPzwnWkeCdDpdz2fhdec2QiIcvc_6k0Isjd7Duzb57I_Lb_o583CtEQX9VbFSj64TiJMel77UxiA4wIA5XwpeAuq8cU7dD20p2ZCgE1iRh0KLodC4thBPXqlKyZ8sQXua_sNHiUAC940g"/>
</nav>
<main class="flex-grow flex flex-col items-center justify-center px-8 pt-24 pb-40">
<!-- Content Canvas -->
<div class="w-full max-w-md space-y-12">
<!-- Headline Section -->
<div class="space-y-2">
<span class="text-[#f2ca50] font-label text-xs uppercase tracking-[0.2em] font-bold">Final Step</span>
<h2 class="text-4xl font-headline font-extrabold tracking-tight leading-none text-on-surface">Identity.</h2>
<p class="text-on-surface-variant body-md max-w-[280px]">Personalize how you appear to others in the anonymous void.</p>
</div>
<!-- Avatar Upload Area -->
<div class="flex justify-center">
<div class="relative group">
<div class="w-48 h-48 rounded-full bg-surface-container-highest border-4 border-outline-variant/20 overflow-hidden flex items-center justify-center shadow-2xl relative">
<img alt="Profile Placeholder" class="w-full h-full object-cover opacity-30 grayscale" data-alt="moody dark textured background with subtle abstract light shapes reflecting off glass-like surface" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDjZdIrTBAEZoJhKUGhdncAbz_p-bJFpEAsICklEUMzf7spwN4ie0Ur_-16W6Npzyfi3zOANgctAwV-mmIXHbTL8KmLcja0wMy59uxm2ouJOUrqT-T3zkgQEueXU9_Vqugb5d1hzeaCcVs3wfXu-n2rYmfaajtgHKMe5b1tlsLxdycYF13icfyZMyYBnj9ClMRQ8f9W8mtkXeAOoxPxVmwn_fVAUk7bbFejJi2WE84UmXNpJ_JC-tgvCThpVZH_oWF4_3DcRrOru_C5"/>

</div>

<span class="material-symbols-outlined text-on-primary font-bold" data-icon="photo_camera" style="font-variation-settings: 'FILL' 1;">photo_camera</span>
</button>
</div>
</div>
<!-- Display Name Input -->
<div class="space-y-4">
<label class="block text-[#f2ca50] font-label text-[10px] uppercase tracking-[0.15em] px-1">Display Name</label>
<div class="relative">
<input class="w-full bg-surface-container-highest/50 border-none rounded-lg px-6 py-5 text-on-surface placeholder:text-on-surface-variant/40 focus:ring-1 focus:ring-primary/40 focus:bg-surface-container-highest transition-all font-medium text-lg" placeholder="Enter your alias..." type="text"/>
<div class="absolute right-6 top-1/2 -translate-y-1/2 text-primary/30">
<span class="material-symbols-outlined" data-icon="edit">edit</span>
</div>
</div>
<p class="text-[10px] text-on-surface-variant/60 italic px-1">You can change this anytime in settings.</p>
</div>
</div>

<footer class="fixed bottom-0 left-0 w-full z-50 flex justify-between items-center px-8 pb-10 pt-6 bg-[#131313]/80 backdrop-blur-xl shadow-[0_-8px_24px_rgba(242,202,80,0.1)] rounded-t-[2rem]">

<div class="flex flex-col items-start justify-center text-[#e2e2e2]/60 uppercase tracking-widest text-[10px] font-plus-jakarta font-semibold">

<span>Step 07 / 07</span>

<div class="flex items-center space-x-2">
<span class="font-plus-jakarta font-bold uppercase tracking-wider text-sm">Finish</span>
<span class="material-symbols-outlined text-lg" data-icon="check_circle" style="font-variation-settings: 'FILL' 1;">check_circle</span>
</div>
</button>
</footer>
